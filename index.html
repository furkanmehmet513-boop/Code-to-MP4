<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Otomatik Hız Göstergesi · 0–140 km/h</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0c0c0c;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      padding: 20px;
    }

    .speedometer-card {
      max-width: 580px;
      width: 100%;
      background: #181818;
      border-radius: 52px;
      padding: 28px 24px 34px;
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    .canvas-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1/1;
      margin-bottom: 12px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #121212;
      box-shadow: inset 0 10px 14px rgba(0,0,0,0.7), 0 0 0 3px #262626;
    }

    .digital-container {
      display: flex;
      justify-content: center;
      align-items: baseline;
      margin: 12px 0 8px;
    }

    .digital-value {
      font-size: 5rem;
      font-weight: 700;
      letter-spacing: -1.5px;
      color: #ff6a2e;
      text-shadow: 0 0 20px rgba(255, 80, 0, 0.7);
      line-height: 1;
    }

    .digital-unit {
      font-size: 1.8rem;
      font-weight: 500;
      margin-left: 10px;
      color: #aaa;
      align-self: flex-end;
      padding-bottom: 8px;
    }

    .status-note {
      text-align: center;
      margin-top: 16px;
      color: #7a7a7a;
      font-weight: 400;
      font-size: 0.95rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .status-note span {
      display: inline-block;
      background: #2a2a2a;
      padding: 6px 18px;
      border-radius: 40px;
      color: #b0b0b0;
    }

    @media (max-width: 480px) {
      .speedometer-card { padding: 20px 16px 24px; }
      .digital-value { font-size: 4rem; }
      .digital-unit { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="speedometer-card">
  <div class="canvas-wrapper">
    <canvas id="speedCanvas" width="600" height="600"></canvas>
  </div>

  <div class="digital-container">
    <span class="digital-value" id="digitalSpeed">0</span>
    <span class="digital-unit">km/h</span>
  </div>

  <div class="status-note">
    <span>▶ OTOMATİK GÖSTERİM · 0 → 140</span>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- DOM Elements ----------
    const canvas = document.getElementById('speedCanvas');
    const ctx = canvas.getContext('2d');
    const digitalSpan = document.getElementById('digitalSpeed');

    // ---------- Sabitler ----------
    const MAX_SPEED = 140;
    const MIN_SPEED = 0;
    
    // Animasyon süresi (ms) — 4 saniye, akıcı geçiş
    const ANIMATION_DURATION = 4000; 
    
    // Canvas sabit boyut (600x600, CSS responsive)
    const SIZE = 600;
    const CENTER_X = SIZE / 2;
    const CENTER_Y = SIZE / 2;
    
    // Yarıçap ayarları
    const ARC_RADIUS = 230;
    const TICK_LENGTH_MAJOR = 28;
    const TICK_LENGTH_MINOR = 14;
    const LABEL_RADIUS = ARC_RADIUS + 42;
    const NEEDLE_LENGTH = ARC_RADIUS - 24;
    
    // Açı: sol (180°) → sağ (360°) 
    const START_ANGLE = Math.PI;            // 180°
    const END_ANGLE = 2 * Math.PI;           // 360°
    
    // Geçerli hız (animasyon sırasında güncellenir)
    let currentSpeed = 0;
    
    // Animasyon kontrolü
    let animStartTime = null;
    let animationFrame = null;
    let isAnimating = true;

    // ---------- Hız -> açı dönüşümü ----------
    function speedToAngle(speed) {
      const ratio = speed / MAX_SPEED;
      return START_ANGLE + ratio * (END_ANGLE - START_ANGLE);
    }

    // ---------- Dijital göstergeyi güncelle (tam sayı) ----------
    function updateDigitalDisplay(speedValue) {
      // Tam sayı göster (0, 5, 10 ... ancak animasyon ara değerlerde integer gösterelim)
      digitalSpan.textContent = Math.round(speedValue);
    }

    // ---------- CANVAS ÇİZİMİ (Kadran, tikler, ibre) ----------
    function drawSpeedometer(speed) {
      ctx.clearRect(0, 0, SIZE, SIZE);
      
      // ----- Arka plan (radyal gradyan) -----
      const bgGrad = ctx.createRadialGradient(CENTER_X-30, CENTER_Y-30, 40, CENTER_X, CENTER_Y, SIZE/1.6);
      bgGrad.addColorStop(0, '#202020');
      bgGrad.addColorStop(1, '#0b0b0b');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, SIZE, SIZE);
      
      // ----- Dış çerçeve halkaları -----
      ctx.beginPath();
      ctx.arc(CENTER_X, CENTER_Y, ARC_RADIUS + 14, 0, 2 * Math.PI);
      ctx.strokeStyle = '#323232';
      ctx.lineWidth = 8;
      ctx.stroke();
      
      ctx.beginPath();
      ctx.arc(CENTER_X, CENTER_Y, ARC_RADIUS + 7, 0, 2 * Math.PI);
      ctx.strokeStyle = '#1f1f1f';
      ctx.lineWidth = 4;
      ctx.stroke();
      
      // ----- Ana yay (arka plan) -----
      ctx.beginPath();
      ctx.arc(CENTER_X, CENTER_Y, ARC_RADIUS, START_ANGLE, END_ANGLE);
      ctx.strokeStyle = '#2c2c2c';
      ctx.lineWidth = 26;
      ctx.stroke();
      
      // Yay üzerine koyu renk geçişi (derinlik)
      const arcGrad = ctx.createLinearGradient(80, 200, 520, 400);
      arcGrad.addColorStop(0, '#2a1e1a');
      arcGrad.addColorStop(1, '#1f2028');
      ctx.beginPath();
      ctx.arc(CENTER_X, CENTER_Y, ARC_RADIUS, START_ANGLE, END_ANGLE);
      ctx.strokeStyle = arcGrad;
      ctx.lineWidth = 22;
      ctx.stroke();
      
      // İç kenar gölgesi
      ctx.beginPath();
      ctx.arc(CENTER_X, CENTER_Y, ARC_RADIUS-12, START_ANGLE, END_ANGLE);
      ctx.strokeStyle = '#151515';
      ctx.lineWidth = 8;
      ctx.stroke();
      
      // ---------- TİK İŞARETLERİ ve SAYILAR ----------
      // 5'er birim tik, 20'de bir büyük tik + sayı
      for (let s = 0; s <= MAX_SPEED; s += 5) {
        const angle = speedToAngle(s);
        const isMajor = (s % 20 === 0);
        const tickLen = isMajor ? TICK_LENGTH_MAJOR : TICK_LENGTH_MINOR;
        
        const innerX = CENTER_X + Math.cos(angle) * (ARC_RADIUS - 14);
        const innerY = CENTER_Y + Math.sin(angle) * (ARC_RADIUS - 14);
        const outerX = CENTER_X + Math.cos(angle) * (ARC_RADIUS - 14 + tickLen);
        const outerY = CENTER_Y + Math.sin(angle) * (ARC_RADIUS - 14 + tickLen);
        
        ctx.beginPath();
        ctx.moveTo(innerX, innerY);
        ctx.lineTo(outerX, outerY);
        ctx.strokeStyle = isMajor ? '#eaeaea' : '#707070';
        ctx.lineWidth = isMajor ? 3.8 : 2.2;
        ctx.lineCap = 'round';
        ctx.stroke();
        
        // Sayısal etiketler (20, 40, 60, 80, 100, 120, 140)
        if (isMajor) {
          const labelX = CENTER_X + Math.cos(angle) * LABEL_RADIUS;
          const labelY = CENTER_Y + Math.sin(angle) * LABEL_RADIUS;
          
          ctx.font = '600 22px "Inter", sans-serif';
          ctx.fillStyle = '#f2f2f2';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          
          let labelText = s.toString();
          ctx.fillText(labelText, labelX, labelY);
        }
      }
      
      // Ekstra: 0 ve 140 daha belirgin (turuncu ton)
      ctx.font = '700 24px "Inter", sans-serif';
      ctx.fillStyle = '#ff9f6e';
      ctx.fillText('0', 
        CENTER_X + Math.cos(START_ANGLE) * (LABEL_RADIUS+2), 
        CENTER_Y + Math.sin(START_ANGLE) * (LABEL_RADIUS+2));
      ctx.fillText('140', 
        CENTER_X + Math.cos(END_ANGLE) * (LABEL_RADIUS+2), 
        CENTER_Y + Math.sin(END_ANGLE) * (LABEL_RADIUS+2));
      
      // "km/h" yazısı kadran altına
      ctx.font = '500 15px "Inter", sans-serif';
      ctx.fillStyle = '#9e9e9e';
      ctx.fillText('km/h', CENTER_X, CENTER_Y + 48);
      
      // ---------- İBRE (NEEDLE) ----------
      const needleAngle = speedToAngle(speed);
      
      // İbre gölgesi (kırmızı-turuncu parlama)
      ctx.shadowColor = '#ff5722';
      ctx.shadowBlur = 22;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
      
      const tipX = CENTER_X + Math.cos(needleAngle) * NEEDLE_LENGTH;
      const tipY = CENTER_Y + Math.sin(needleAngle) * NEEDLE_LENGTH;
      
      // Ana ibre (kalın)
      ctx.beginPath();
      ctx.moveTo(CENTER_X, CENTER_Y);
      ctx.lineTo(tipX, tipY);
      ctx.strokeStyle = '#ff5e1a';
      ctx.lineWidth = 10;
      ctx.lineCap = 'round';
      ctx.stroke();
      
      // İç parlak hat
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.moveTo(CENTER_X, CENTER_Y);
      ctx.lineTo(tipX, tipY);
      ctx.strokeStyle = '#ff9f4b';
      ctx.lineWidth = 4.5;
      ctx.stroke();
      
      // Gölgeyi sıfırla
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      
      // ----- Merkez pivot (koyu) -----
      ctx.beginPath();
      ctx.arc(CENTER_X, CENTER_Y, 20, 0, 2 * Math.PI);
      const pinGrad = ctx.createRadialGradient(CENTER_X-5, CENTER_Y-5, 3, CENTER_X, CENTER_Y, 24);
      pinGrad.addColorStop(0, '#3f3f3f');
      pinGrad.addColorStop(0.8, '#111111');
      ctx.fillStyle = pinGrad;
      ctx.fill();
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#000000b0';
      ctx.strokeStyle = '#3a3a3a';
      ctx.lineWidth = 3.5;
      ctx.stroke();
      ctx.shadowBlur = 0;
      
      // Merkez kırmızı nokta
      ctx.beginPath();
      ctx.arc(CENTER_X, CENTER_Y, 10, 0, 2 * Math.PI);
      ctx.fillStyle = '#ff4f1e';
      ctx.shadowColor = '#ff4400';
      ctx.shadowBlur = 18;
      ctx.fill();
      ctx.shadowBlur = 0;
      
      ctx.beginPath();
      ctx.arc(CENTER_X, CENTER_Y, 6, 0, 2 * Math.PI);
      ctx.fillStyle = '#151515';
      ctx.fill();
      
      // İbre ucu vurgusu
      ctx.beginPath();
      ctx.arc(tipX, tipY, 7, 0, 2 * Math.PI);
      ctx.fillStyle = '#ff6a2e';
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#ff3a00';
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // ---------- Animasyon Döngüsü (requestAnimationFrame) ----------
    function animationStep(timestamp) {
      if (!isAnimating) return;
      
      if (animStartTime === null) {
        animStartTime = timestamp;
      }
      
      const elapsed = timestamp - animStartTime;
      let progress = Math.min(elapsed / ANIMATION_DURATION, 1.0);
      
      // Yumuşak geçiş için easing (easeOutCubic)
      // progress = 1 - (1 - progress)^3
      const eased = 1 - Math.pow(1 - progress, 3);
      
      // Mevcut hız (0 ile 140 arası)
      const rawSpeed = MIN_SPEED + eased * (MAX_SPEED - MIN_SPEED);
      // Ondalıklı değer, ancak dijitalde tam sayıya yuvarlayacağız.
      currentSpeed = rawSpeed;
      
      // Canvas'ı yeniden çiz
      drawSpeedometer(currentSpeed);
      
      // Dijital göstergeyi güncelle (tam sayı)
      updateDigitalDisplay(currentSpeed);
      
      // Animasyon tamamlandı mı?
      if (progress < 1.0) {
        animationFrame = requestAnimationFrame(animationStep);
      } else {
        // Son kareyi garantiye al: tam 140
        currentSpeed = MAX_SPEED;
        drawSpeedometer(currentSpeed);
        updateDigitalDisplay(currentSpeed);
        isAnimating = false;
        animationFrame = null;
        animStartTime = null;
        // Durdu mesajı değiştirelim (isteğe bağlı)
        const noteSpan = document.querySelector('.status-note span');
        if (noteSpan) noteSpan.textContent = '■ 140 km/h · TAMAMLANDI';
      }
    }

    // ---------- Animasyonu başlat ----------
    function startAnimation() {
      // Eğer zaten çalışıyorsa iptal et (güvenlik)
      if (animationFrame) {
        cancelAnimationFrame(animationFrame);
      }
      isAnimating = true;
      animStartTime = null;
      
      // Başlangıç değeri 0
      currentSpeed = 0;
      drawSpeedometer(currentSpeed);
      updateDigitalDisplay(currentSpeed);
      
      // Status metnini sıfırla
      const noteSpan = document.querySelector('.status-note span');
      if (noteSpan) noteSpan.textContent = '▶ OTOMATİK GÖSTERİM · 0 → 140';
      
      // İlk kareyi başlat
      animationFrame = requestAnimationFrame(animationStep);
    }

    // ---------- Responsive: Canvas boyutu sabit, CSS scale eder ----------
    // (Ek bir işlem gerekmez)
    
    // ---------- Sayfa yüklendiğinde animasyonu başlat ----------
    window.addEventListener('load', () => {
      // İlk çizim (0 km/h)
      drawSpeedometer(0);
      updateDigitalDisplay(0);
      
      // Kısa bir gecikme ile animasyonu başlat (kullanıcı görsün diye)
      setTimeout(() => {
        startAnimation();
      }, 200);
    });

    // İsteğe bağlı: sayfa görünürlük değişirse animasyonu durdurmayalım, zaten bitince duracak.
    // Eğer tekrar izlemek istenirse buton yok, ama tekrar başlatma yok. Gereksinim: tek seferlik.
    
  })();
</script>
</body>
</html>
